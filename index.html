    <title>Любимой Ангелине ❤️</title>
    <style>
        body {
            background-color: #05000a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Georgia', serif;
            color: #ffb7c5;
            cursor: pointer;
            user-select: none; /* Запрет выделения текста */
        }

        .cyber-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            font-family: 'Courier New', Courier, monospace;
        }

        .menu-toggle {
            background: rgba(10, 0, 20, 0.85);
            color: #ff007f;
            border: 1px solid #ff007f;
            padding: 12px 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 0 15px rgba(255, 0, 157, 0.5);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: 0.3s;
            border-radius: 2px;
        }

        .menu-toggle:hover {
            box-shadow: 0 0 25px rgba(255, 0, 157, 0.5);
            text-shadow: 0 0 5px #ff007f;
        }

        .menu-list {
            display: none;
            position: absolute;
            top: 55px;
            right: 0;
            list-style: none;
            padding: 5px 0;
            margin: 0;
            width: 220px;
            max-height: 300px; 
            overflow-y: auto;
            overflow-x: hidden;
            background: rgba(5, 0, 10, 0.95);
            border: 1px solid #ff007f;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
            backdrop-filter: blur(15px);
            border-radius: 4px;
        }

        .menu-list.active {
            display: block;
            animation: cyber-drop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .menu-list::-webkit-scrollbar { width: 4px; }
        .menu-list::-webkit-scrollbar-track { background: #05000a; }
        .menu-list::-webkit-scrollbar-thumb { background: #ff007f; box-shadow: 0 0 10px #ff007f; }

        .menu-list li a {
            display: block;
            color: #ffb7c5;
            text-decoration: none;
            padding: 15px 20px;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 0, 127, 0.1);
            transition: 0.2s;
        }

        .menu-list li a:hover {
            background: rgba(255, 0, 127, 0.15);
            color: #fff;
            padding-left: 25px;
            text-shadow: 0 0 8px #ff007f;
        }

        @keyframes cyber-drop {
            from { opacity: 0; transform: translateY(-20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .wrapper { perspective: 1000px; }
        .scene {
            position: relative;
            width: 400px;
            height: 400px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }
        .center-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            animation: heartbeat 1.5s infinite;
            z-index: 10;
        }
        .hint-text {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00f3ff;
            opacity: 0.6;
            animation: pulse 2s infinite;
        }
        .text-line {
            position: absolute;
            white-space: nowrap;
            color: #ff99cc;
            text-shadow: 0 0 5px #ff007f;
        }
        .mini-heart {
            position: absolute;
            font-size: 20px;
            pointer-events: none;
            animation: fly-up 1.5s ease-out forwards;
        }
        @keyframes heartbeat {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
        @keyframes fly-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
